<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Keys | Typing Challenge</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts: Inter and Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { transition: opacity 0.3s ease; }
    </style>
</head>
<body>
    <!-- Background Decor -->
    <div class="bg-accent-top"></div>
    <div class="bg-accent-bottom"></div>
    <div id="particles-container" class="particles-container"></div>

    <!-- Home View -->
    <section id="home-view" class="view active">
        <div class="view-content center">
            <div class="title-section">
                <h1 class="main-title">TYPING KEYS</h1>
                <div class="title-underline"></div>
            </div>
            <p class="description">
                A high-stakes typing challenge. Master THE KEYBOARD, clear the clouds,
                and reach for the highest score.
            </p>
            <div class="btn-container">
                <button id="start-game-btn" class="btn btn-primary btn-large">
                    <span class="btn-text">Start Game</span>
                    <div class="btn-shine"></div>
                </button>
            </div>
            <div class="home-footer">
                <div class="tag"><span class="tag-dot amber"></span> Fast</div>
                <div class="tag"><span class="tag-dot blue"></span> Accurate</div>
                <div class="tag"><span class="tag-dot indigo"></span> Intense</div>
            </div>
        </div>
        <!-- Decorative Text -->
        <div class="decor-text bottom-left">TYPE</div>
        <div class="decor-text top-right">FAST</div>
    </section>

    <script src="js/shared.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
